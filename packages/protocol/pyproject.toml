[project]
name = "agent-gtd-dispatch-protocol"
version = "0.1.0"
description = "Shared wire-contract schemas for the agent-gtd-dispatch API"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_gtd_dispatch_protocol"]
