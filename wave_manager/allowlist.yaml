# wave_manager/allowlist.yaml
#
# Rules the wave manager executor may auto-approve for merge.
# v1 ships empty — executor halts on any non-clean merge.
# Add entries empirically after observing safe-to-automate patterns.
# Each entry is PR-reviewable and diffable.
#
# Schema per rule entry:
#   name: (required) unique rule identifier, e.g. "lint-fix"
#   description: (required) human-readable reason why this pattern is safe to auto-merge
#   comment_patterns: (optional) list of Python regexes; ALL must match the agent's final GTD comment
#                     Empty list (or omitted) means "match any comment"
#   diff_path_patterns: (optional) list of fnmatch globs; EVERY changed file path in the diff
#                       must match at least one pattern for the rule to apply.
#                       Empty list (or omitted) means "match any file path"
#
# Example (add after empirical verification, then PR-review before merging):
#
# rules:
#   - name: format-fix
#     description: "Pure formatting changes produced by ruff format — no logic change"
#     comment_patterns:
#       - "(?i)format"
#     diff_path_patterns:
#       - "*.py"
#
#   - name: uv-lock-update
#     description: "Trivial uv.lock update with no dependency version changes"
#     comment_patterns: []
#     diff_path_patterns:
#       - "uv.lock"

rules: []
