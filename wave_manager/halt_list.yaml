# wave_manager/halt_list.yaml
#
# Path patterns that require human review.  If a wave's child build touches
# any file matching one of these patterns, the wave halts and posts a
# comment for the lead to review the branch manually.
#
# Curation principle: evidence-driven.  Add a pattern when we have a
# concrete reason ("auto-merging this bit us once").  Resist hypothetical
# risk theater.  Default-allow with explicit exclusions is the contract.
#
# Each entry:
#   name: stable identifier
#   description: why this needs eyes
#   file_patterns: fnmatch globs.  Any match → halt.

halt_patterns:
  - name: auth-code
    description: "Authentication paths can fail-open silently; gates won't catch all auth bugs."
    file_patterns:
      - "**/auth.py"
      - "**/auth_routes.py"
      - "**/routes/auth_routes.py"

  - name: deploy-and-release-scripts
    description: "Bad deploy/release scripts can lock out production or cut a bad release."
    file_patterns:
      - "deploy.sh"
      - "release.sh"
      - "start.sh"
      - "serve.sh"

  - name: ci-and-hooks
    description: "CI config + pre-commit hooks affect every future commit; mistakes are easy to land but painful to recover."
    file_patterns:
      - ".github/**"
      - ".pre-commit-config.yaml"

  - name: infra-units
    description: "Systemd units, Dockerfiles, nginx configs — production runtime surface."
    file_patterns:
      - "*.service"
      - "Dockerfile*"
      - "nginx*.conf"

  - name: env-and-secrets
    description: "Defense in depth — env files should never be in dispatch diffs."
    file_patterns:
      - ".env*"
      - ".envrc*"
